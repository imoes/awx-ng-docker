<?xml version="1.0" encoding="utf-8"?>
<!-- AWX-NextGeneration emblem: hexagon badge + forward double-chevron -->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     x="0px" y="0px" viewBox="0 0 500 500" xml:space="preserve">
  <defs>
    <linearGradient id="awxngGrad" x1="55" y1="81" x2="445" y2="419" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Flat-top hexagon, corners rounded via round stroke join -->
  <polygon points="445,250 347.5,418.9 152.5,418.9 55,250 152.5,81.1 347.5,81.1"
           fill="url(#awxngGrad)" stroke="url(#awxngGrad)" stroke-width="30"
           stroke-linejoin="round"/>
  <!-- Forward double-chevron »  ( = next generation / fast-forward ) -->
  <g fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="158,170 238,250 158,330"/>
    <polyline points="262,170 342,250 262,330" stroke="#e6fffa"/>
  </g>
</svg>
