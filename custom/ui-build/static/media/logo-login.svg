<?xml version="1.0" encoding="utf-8"?>
<!-- AWX-NextGeneration login lockup: emblem + wordmark -->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     x="0px" y="0px" viewBox="0 0 560 600" xml:space="preserve">
  <defs>
    <linearGradient id="awxngGradLogin" x1="100" y1="30" x2="460" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="awxngText" x1="140" y1="420" x2="420" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Emblem centered at x=280, scale 0.72 -->
  <g transform="translate(100,20) scale(0.72)">
    <polygon points="445,250 347.5,418.9 152.5,418.9 55,250 152.5,81.1 347.5,81.1"
             fill="url(#awxngGradLogin)" stroke="url(#awxngGradLogin)" stroke-width="30"
             stroke-linejoin="round"/>
    <g fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="158,170 238,250 158,330"/>
      <polyline points="262,170 342,250 262,330" stroke="#e6fffa"/>
    </g>
  </g>

  <!-- "AWX" wordmark -->
  <text x="280" y="480" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="116" font-weight="800" letter-spacing="6"
        fill="url(#awxngText)">AWX</text>

  <!-- "NEXT GENERATION" subtitle — smaller spacing to avoid clipping -->
  <text x="280" y="537" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="600" letter-spacing="8"
        fill="#64748b">NEXT GENERATION</text>
</svg>
