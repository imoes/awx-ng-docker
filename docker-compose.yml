# awx-ng Production Docker Compose  (Dreiergespann: Control + local Execution Node + Remote Proxies)
# AWX 24.6.1 — unoffizielles docker-compose Produktionsbetrieb
#
# Bind-Mount-Strategie:
#   Code (customvars, patched URLs) → in Docker-Image gebaut (via Dockerfile)
#   Daten (postgres, redis, projects, receptor) → Host-Verzeichnisse (portabel)
#
# Vor dem ersten Start:
#   cp .env.example .env                    # Zugangsdaten eintragen
#   mkdir -p data/postgres data/redis data/projects data/receptor
#   chmod 777 data/receptor                 # awx-ee läuft als uid=1000
#   docker compose up -d

name: awx-ng

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: awx
      POSTGRES_USER: awx
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awx -d awx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Einmalige DB-Migration + Admin-User-Anlage ───────────────────────────────
  # Läuft bei jedem Start, aber migrate ist idempotent (keine Dopplungen).
  awx_init:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    entrypoint: ["bash", "/usr/local/bin/init_awx.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - pg_password
      - secret_key
    volumes:
      - ./config/custom.py:/etc/tower/settings.py:ro
      - ./data/projects:/var/lib/awx/projects
      - ./data/receptor:/var/run/receptor
    environment:
      DATABASE_USER: awx
      DATABASE_NAME: awx
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_PASSWORD_FILE: /run/secrets/pg_password
      AWX_ADMIN_USER: admin
      AWX_ADMIN_PASSWORD: ${AWX_ADMIN_PASSWORD:?Bitte AWX_ADMIN_PASSWORD in deploy/.env setzen}
      AWX_ADMIN_EMAIL: admin@awx-ng.local
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SECRET_KEY_FILE: /run/secrets/secret_key

  # ── Control Node (Web) ────────────────────────────────────────────────────
  awx_web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["dumb-init", "--", "/usr/bin/launch_awx_web.sh"]
    hostname: awx-ng-control
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      awx_init:
        condition: service_completed_successfully
    ports:
      - "8052:80"
    secrets:
      - pg_password
      - secret_key
    volumes:
      - ./config/custom.py:/etc/tower/settings.py:ro
      - ./config/nginx_awx.conf:/etc/nginx/nginx.conf:ro
      - ./data/projects:/var/lib/awx/projects
      - ./data/receptor:/var/run/receptor
      - ${ANSIBLE_REPO_PATH:-/home/mutkluge/Dev/ansible/ansible03}:/var/lib/awx/ansible03:rw
    environment:
      DATABASE_USER: awx
      DATABASE_NAME: awx
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_PASSWORD_FILE: /run/secrets/pg_password
      AWX_ADMIN_USER: admin
      AWX_ADMIN_PASSWORD: ${AWX_ADMIN_PASSWORD:?Bitte AWX_ADMIN_PASSWORD in deploy/.env setzen}
      AWX_ADMIN_EMAIL: admin@awx-ng.local
      AWX_LOGGING_MODE: stdout
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SECRET_KEY_FILE: /run/secrets/secret_key
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
      OIDC_KEY: ${OIDC_KEY:-}
      OIDC_SECRET: ${OIDC_SECRET:-}
      OIDC_ENDPOINT: ${OIDC_ENDPOINT:-}
      OIDC_VERIFY_SSL: ${OIDC_VERIFY_SSL:-true}
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost/api/v2/ping/ | grep -q version"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Control Node (Task/Dispatcher) ────────────────────────────────────────
  awx_task:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["dumb-init", "--", "/usr/bin/launch_awx_task_ng.sh"]
    hostname: awx-ng-control
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      awx_web:
        condition: service_healthy
      awx_ee:
        condition: service_healthy
    secrets:
      - pg_password
      - secret_key
    volumes:
      - ./config/custom.py:/etc/tower/settings.py:ro
      - ./receptor/receptor-control.conf:/etc/receptor/receptor.conf:ro
      - ./data/projects:/var/lib/awx/projects
      - ./data/receptor:/var/run/receptor
      - ${ANSIBLE_REPO_PATH:-/home/mutkluge/Dev/ansible/ansible03}:/var/lib/awx/ansible03:rw
    environment:
      DATABASE_USER: awx
      DATABASE_NAME: awx
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_PASSWORD_FILE: /run/secrets/pg_password
      AWX_LOGGING_MODE: stdout
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SECRET_KEY_FILE: /run/secrets/secret_key
      CONTROL_PLANE_NODE_COUNT: "1"
      AWX_INSTANCE_HOSTNAME: awx-ng-control
      AWX_NODE_TYPE: hybrid
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
      OIDC_KEY: ${OIDC_KEY:-}
      OIDC_SECRET: ${OIDC_SECRET:-}
      OIDC_ENDPOINT: ${OIDC_ENDPOINT:-}
      OIDC_VERIFY_SSL: ${OIDC_VERIFY_SSL:-true}
      AWX_NG_WATCH_PROJECTS: "true"

  # ── Lokaler Execution Node (Receptor + ansible-runner + docker CLI) ─────────
  awx_ee:
    build:
      context: .
      dockerfile: Dockerfile.ee
    restart: unless-stopped
    entrypoint: ["sh", "-c", "rm -f /var/run/receptor/receptor.sock* && exec receptor --config /etc/receptor/receptor.conf"]
    hostname: awx-ng-local-ee
    depends_on:
      awx_web:
        condition: service_healthy
    ports:
      - "2222:2222"
    volumes:
      - ./receptor/receptor-control.conf:/etc/receptor/receptor.conf:ro
      - ./data/projects:/var/lib/awx/projects
      - ./data/receptor:/var/run/receptor
      - ${ANSIBLE_REPO_PATH:-/home/mutkluge/Dev/ansible/ansible03}:/var/lib/awx/ansible03:rw
    environment:
      AWX_NG_CONTROL: "true"
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/receptor/receptor.sock"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

secrets:
  pg_password:
    file: ./secrets/pg_password
  secret_key:
    file: ./secrets/secret_key
