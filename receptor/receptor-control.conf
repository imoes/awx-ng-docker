# Receptor configuration for the awx-ng Control Node (runs inside awx_task container)
# This node accepts connections from remote execution-node proxies.
---
- node:
    id: awx-ng-control
    firewallrules:
      - action: "reject"
        tonode: awx-ng-control
        toservice: "control"

- log-level: info

# Listen for incoming proxy connections on port 2222
- tcp-listener:
    port: 2222

# AWX control socket
- control-service:
    service: control
    filename: /var/run/receptor/receptor.sock

# Local work execution (ansible-runner must be in PATH)
- work-command:
    worktype: local
    command: ansible-runner
    params: worker
    allowruntimeparams: true
    verifysignature: false
